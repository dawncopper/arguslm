name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # litellm (server extra) does not yet support Python 3.14
      - run: pip install -e ".[server,dev]"
        if: matrix.python-version != '3.14'
      - run: pip install -e ".[dev]"
        if: matrix.python-version == '3.14'
      - run: pytest tests/ -x -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check arguslm/
      - run: ruff format --check arguslm/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install build
      - run: python -m build
      - run: pip install dist/*.whl && python -c "from arguslm import ArgusLMClient; print('Import OK')"
