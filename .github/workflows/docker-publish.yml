name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bluet/arguslm
            context: .
            dockerfile: Dockerfile
          - image: bluet/arguslm-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      # actions/checkout SHA-pinned for the same supply-chain reasoning
      # documented below — pinned to v6.0.2 (verified via gh api repos/actions/checkout/tags).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # Use workflow_dispatch input if provided, otherwise the pushed tag.
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          # Strip leading 'v' (v0.3.0 -> 0.3.0) so Docker tags follow convention.
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      # Third-party actions pinned to commit SHA (SonarCloud S7637): tag refs
      # like @v3 are mutable — repo owners can re-tag a malicious revision.
      # Pinning to a SHA removes that supply-chain risk. Renovate is configured
      # to auto-bump these via PRs.
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
